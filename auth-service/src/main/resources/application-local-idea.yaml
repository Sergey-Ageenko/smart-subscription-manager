spring:
  application:
    name: auth-service

  datasource:
    url: jdbc:postgresql://localhost:5432/auth_db
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver

  jpa:
    properties:
      hibernate:
        default_schema: auth_service
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    open-in-view: true

  data:
    redis:
      host: localhost
      port: 6379

  flyway:
    enabled: true
    locations: classpath:db/migration
    schemas: auth_service

  kafka:
    bootstrap-servers: localhost:9092
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer

jwt:
  secret: "TGm9uN/S0kF0aGVf5iLJ7vrESh+rMMIqTZLGanm+od/vraHRrU5xyQN9DCkpTnjUwiaHrufbGewLkDlCycLtFw=="
  access-token-expiration: 900000   # 15min
  refresh-token-expiration: 604800000 # 7d


app:
  outbox:
    poll-interval-ms: 5000


server:
  port: 8189

logging:
  level:
    com.ssm.auth_service: TRACE
    org:
      springframework:
        security: DEBUG
        web: DEBUG
        core:
          env: DEBUG
      flywaydb: DEBUG